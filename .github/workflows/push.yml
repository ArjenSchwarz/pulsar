on: [push]

jobs:
  build-and-test:
    name: Test and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run tests
        run: go test ./... -v
      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          skip-cache: true
      - name: Build
        run: go build -o pulsar .
